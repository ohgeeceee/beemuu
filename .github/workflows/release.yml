name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BeeEmUu ${{ github.ref_name }}'
          releaseBody: |
            Windows installers below:
            - `.exe` — NSIS installer (recommended for most users)
            - `.msi` — MSI installer

            ⚠️ Modifying vehicle electronics carries inherent risks. Always use a battery maintainer before flashing or deep coding.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # v0.13.0: update the beemuu.com landing page with the new release info.
      #
      # Writes a small `_release_info.json` into frontend/ (read by the
      # page's `loadReleaseInfo()` in frontend/app.js) and rsyncs the
      # frontend/ directory to /var/www/beemuu/frontend/ on the NJ
      # Spectrum VPS via a deploy SSH key locked to that single directory
      # (see `authorized_keys` restriction in the PR description).
      #
      # The deploy is intentionally narrow:
      #   - touches frontend/ only (no nginx config, no backend/, no api.beemuu.com)
      #   - gated on v* tag push (same trigger as the desktop release)
      #   - fails closed: missing secrets → step errors, page keeps working
      #   - generated _release_info.json is gitignored (see frontend/.gitignore)
      #
      # Secrets required (set in repo Settings → Secrets):
      #   BEEMUU_VPS_SSH_KEY  — the deploy key private key (file)
      #   BEEMUU_VPS_HOST     — e.g. vps3490050.trouble-free.net
      # Vars (set in repo Settings → Variables):
      #   BEEMUU_VPS_USER     — SSH login, defaults to "deploy"
      - name: Update beemuu.com landing page
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          BEEMUU_VPS_SSH_KEY: ${{ secrets.BEEMUU_VPS_SSH_KEY }}
          BEEMUU_VPS_HOST: ${{ secrets.BEEMUU_VPS_HOST }}
          BEEMUU_VPS_USER: ${{ vars.BEEMUU_VPS_USER || 'deploy' }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.13.0
          VERSION="${TAG#v}"                # strip leading 'v'
          RELEASES_BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          MSI_URL="${RELEASES_BASE}/BeeEmUu_${VERSION}_x64_en-US.msi"
          NSIS_URL="${RELEASES_BASE}/BeeEmUu_${VERSION}_x64-setup.exe"
          mkdir -p .ssh
          printf '%s' "${BEEMUU_VPS_SSH_KEY}" > .ssh/deploy_key
          chmod 0600 .ssh/deploy_key
          # Generate the release info JSON the landing page reads on load.
          cat > frontend/_release_info.json <<JSON
          {
            "tag": "${TAG}",
            "version": "${VERSION}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "downloads": {
              "msi": "${MSI_URL}",
              "nsis": "${NSIS_URL}"
            }
          }
          JSON
          # rsync the landing page only. The deploy key's authorized_keys
          # is restricted to `command="rsync --server ..."` for that single
          # directory, so even a leaked key can't touch anything else.
          rsync -avz --delete \
            -e "ssh -i ./.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=./.ssh/known_hosts" \
            frontend/ "${BEEMUU_VPS_USER}@${BEEMUU_VPS_HOST}:/var/www/beemuu/frontend/"
          rm -f .ssh/deploy_key
