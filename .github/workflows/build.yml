name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend + TOML validation ───
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Check TOML formatting (basic)
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            let ok = true;
            function walk(dir) {
              for (const f of fs.readdirSync(dir)) {
                const p = path.join(dir, f);
                if (fs.statSync(p).isDirectory()) walk(p);
                else if (p.endsWith('.toml')) {
                  const data = fs.readFileSync(p, 'utf8');
                  // Basic checks: no tabs, no trailing whitespace on lines, file ends with newline
                  const lines = data.split('\n');
                  for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('\t')) {
                      console.error('TAB in ' + p + ':' + (i+1));
                      ok = false;
                    }
                    if (lines[i].endsWith(' ')) {
                      console.error('Trailing space in ' + p + ':' + (i+1));
                      ok = false;
                    }
                  }
                  if (!data.endsWith('\n')) {
                    console.error('Missing trailing newline: ' + p);
                    ok = false;
                  }
                }
              }
            }
            walk('community');
            if (!ok) process.exit(1);
            console.log('All TOML files clean.');
          "

      - name: Check for proprietary BMW data (heuristic)
        run: |
          # Block common ISTA/INPA proprietary strings
          if grep -ri "sgbd\|prg file\|ista fault\|bmw internal\|proprietary data" community/ --include="*.toml" || \
             grep -ri "sgbd\|prg file\|ista fault\|bmw internal\|proprietary data" research/ --include="*.md"; then
            echo "ERROR: Possible proprietary data detected. See CONTRIBUTING.md §No BMW proprietary data."
            exit 1
          fi
          echo "No proprietary markers found."

  # ─── Rust backend ───
  rust:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libudev-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install

      - name: Check Rust formatting
        run: cd src-tauri && cargo fmt -- --check

      - name: Run Clippy
        run: cd src-tauri && cargo clippy --all-targets --all-features -- -D warnings
        # Remove -D warnings if clippy is too strict during early development

      - name: Run Rust tests
        run: cd src-tauri && cargo test
        # Tests that need hardware can be marked #[ignore] and skipped in CI

      - name: Build check (no release)
        run: cd src-tauri && cargo build --release
        # Verifies the backend compiles without running the full Tauri bundle

      # Optional: build the full Tauri app for verification (slower)
      # - name: Build Tauri app
      #   uses: tauri-apps/tauri-action@v0
      #   with:
      #     args: "--debug"

