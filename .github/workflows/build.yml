name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend + TOML validation ───
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm install

      - name: Check TOML formatting (basic)
        run: node scripts/lint-toml.js

      # Regenerate the community/forum index from thread files and fail
      # the build if the committed index.json doesn't match what the
      # script produces. Runners come with Python 3.12+ on Ubuntu-latest;
      # tomllib is stdlib.
      #
      # `set -x` plus an `od -c` dump of the regenerated file are on
      # here so the next time this step fails we can see exactly which
      # byte of the regenerated output doesn't match the committed
      # version (the diff shows in the log verbatim). This is diagnostic
      # scaffolding while the underlying cause is investigated; can be
      # dropped once the check is reliably green across platforms.
      - name: Check community/forum/index.json is up to date
        run: |
          set -x
          python3 --version
          python3 -c "import sys; print('default encoding:', sys.getdefaultencoding())"
          git --version
          python3 scripts/forum_index.py
          python3 -c "import sys; sys.stdout.buffer.write(open('community/forum/index.json','rb').read())" | od -c | head -50
          git diff community/forum/index.json
          if ! git diff --quiet community/forum/index.json; then
            echo "::error::community/forum/index.json is out of date. Run 'python3 scripts/forum_index.py' and commit the result."
            exit 1
          fi