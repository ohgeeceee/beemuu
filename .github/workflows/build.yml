name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend + TOML validation ───
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Check TOML formatting (basic)
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            let ok = true;
            function walk(dir) {
              for (const f of fs.readdirSync(dir)) {
                const p = path.join(dir, f);
                if (fs.statSync(p).isDirectory()) walk(p);
                else if (p.endsWith('.toml')) {
                  const data = fs.readFileSync(p, 'utf8');
                  // Basic checks: no tabs, no trailing whitespace on lines, file ends with newline
                  const lines = data.split('\n');
                  for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('\t')) {
                      console.error('TAB in ' + p + ':' + (i+1));
                      ok = false;
                    }
                    if (lines[i].endsWith(' ')) {
                      console.error('Trailing space in ' + p + '