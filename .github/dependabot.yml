version: 2

updates:
  # ─── npm / JavaScript dependencies (Tauri CLI, etc.) ───
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ohgeeceee"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Security updates bypass the limit above and always open a PR
    groups:
      # Group minor/patch updates together to reduce PR noise
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ─── Rust / Cargo dependencies (Tauri, serde, serialport, etc.) ───
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ohgeeceee"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # serialport and other hardware-facing crates can be sensitive —
    # review major version bumps carefully before merging
    ignore:
      # Ignore pre-release versions to avoid noise
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── GitHub Actions (workflow files) ───
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
