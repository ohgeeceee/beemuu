<?xml version="1.0" encoding="UTF-8"?>
<!--
  Schematic: CAS3/CAS4 connector pinout (e90 reference)
  Series:    e90 (3 Series, 2005-2013)
  License:   CC0 (public-domain dedication) — drawn from generic BMW
             electrical reference knowledge; verify against the actual
             harness before use.
  Note:      pin assignments represent the typical CAS3 26-pin connector
             found in e90 chassis. Always cross-reference your specific
             MY harness — pinouts changed mid-cycle (LCI 2008-09).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     width="800" height="500" font-family="Helvetica, Arial, sans-serif">
  <title>CAS3 connector pinout (e90 3 Series reference)</title>
  <desc>Generic CC0 pinout of a 26-pin CAS connector viewed from the wiring
        side. Pins labeled with their typical signal. Verify against your
        harness — automotive pinouts are not standardized across MY.</desc>

  <rect x="0" y="0" width="800" height="500" fill="#fafafa"/>
  <text x="20" y="30" font-size="18" font-weight="bold" fill="#222">
    CAS3 / CAS4 Connector — Pin Reference (e90, generic)
  </text>
  <text x="20" y="50" font-size="11" fill="#555">
    License: CC0  •  Pin numbers shown are typical — confirm against your harness wiring diagram  •  LCI 2008-09 pinout may differ
  </text>

  <!-- Connector outline -->
  <rect x="280" y="90" width="240" height="380" fill="#f0f0f0" stroke="#333" stroke-width="2" rx="6"/>
  <text x="400" y="112" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">
    CAS connector (wiring side, viewed into plug)
  </text>

  <!-- 26 pins: 2 columns of 13 -->
  <!-- Left column: pins 1..13 -->
  <!-- Right column: pins 14..26 -->
  <g font-size="10" fill="#222">

    <!-- Pin 1 -->
    <circle cx="320" cy="140" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="143" text-anchor="middle">1</text>
    <text x="310" y="143" text-anchor="end" fill="#a33">+12V KL30</text>

    <!-- Pin 14 (right top) -->
    <circle cx="480" cy="140" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="143" text-anchor="middle">14</text>
    <text x="490" y="143" fill="#06a">K-CAN H</text>

    <!-- Pin 2 -->
    <circle cx="320" cy="168" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="171" text-anchor="middle">2</text>
    <text x="310" y="171" text-anchor="end" fill="#333">GND</text>

    <!-- Pin 15 -->
    <circle cx="480" cy="168" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="171" text-anchor="middle">15</text>
    <text x="490" y="171" fill="#06a">K-CAN L</text>

    <!-- Pin 3 -->
    <circle cx="320" cy="196" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="199" text-anchor="middle">3</text>
    <text x="310" y="199" text-anchor="end" fill="#a33">KL15 (ign)</text>

    <!-- Pin 16 -->
    <circle cx="480" cy="196" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="199" text-anchor="middle">16</text>
    <text x="490" y="199" fill="#174">PT-CAN H</text>

    <!-- Pin 4 -->
    <circle cx="320" cy="224" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="227" text-anchor="middle">4</text>
    <text x="310" y="227" text-anchor="end" fill="#a33">KL50 (start)</text>

    <!-- Pin 17 -->
    <circle cx="480" cy="224" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="227" text-anchor="middle">17</text>
    <text x="490" y="227" fill="#174">PT-CAN L</text>

    <!-- Pin 5 -->
    <circle cx="320" cy="252" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="255" text-anchor="middle">5</text>
    <text x="310" y="255" text-anchor="end" fill="#333">EWS antenna</text>

    <!-- Pin 18 -->
    <circle cx="480" cy="252" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="255" text-anchor="middle">18</text>
    <text x="490" y="255" fill="#333">EWS return</text>

    <!-- Pin 6 -->
    <circle cx="320" cy="280" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="283" text-anchor="middle">6</text>
    <text x="310" y="283" text-anchor="end" fill="#234">CAS PT-CAN out</text>

    <!-- Pin 19 -->
    <circle cx="480" cy="280" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="283" text-anchor="middle">19</text>
    <text x="490" y="283" fill="#234">to DME (wake)</text>

    <!-- Pin 7 -->
    <circle cx="320" cy="308" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="311" text-anchor="middle">7</text>
    <text x="310" y="311" text-anchor="end" fill="#333">CAS K-CAN out</text>

    <!-- Pin 20 -->
    <circle cx="480" cy="308" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="311" text-anchor="middle">20</text>
    <text x="490" y="311" fill="#222">Coding bypass*</text>

    <!-- Pin 8 -->
    <circle cx="320" cy="336" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="339" text-anchor="middle">8</text>
    <text x="310" y="339" text-anchor="end" fill="#222">Convenience wake</text>

    <!-- Pin 21 -->
    <circle cx="480" cy="336" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="339" text-anchor="middle">21</text>
    <text x="490" y="339" fill="#222">Mirror fold signal</text>

    <!-- Pin 9 -->
    <circle cx="320" cy="364" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="367" text-anchor="middle">9</text>
    <text x="310" y="367" text-anchor="end" fill="#222">Starter relay ctrl</text>

    <!-- Pin 22 -->
    <circle cx="480" cy="364" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="367" text-anchor="middle">22</text>
    <text x="490" y="367" fill="#222">Diagnostic D-PIN</text>

    <!-- Pin 10 -->
    <circle cx="320" cy="392" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="395" text-anchor="middle">10</text>
    <text x="310" y="395" text-anchor="end" fill="#222">K-CAN wake</text>

    <!-- Pin 23 -->
    <circle cx="480" cy="392" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="395" text-anchor="middle">23</text>
    <text x="490" y="395" fill="#222">Relay KL15 ctrl</text>

    <!-- Pin 11 -->
    <circle cx="320" cy="420" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="423" text-anchor="middle">11</text>
    <text x="310" y="423" text-anchor="end" fill="#333">GND (signal)</text>

    <!-- Pin 24 -->
    <circle cx="480" cy="420" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="423" text-anchor="middle">24</text>
    <text x="490" y="423" fill="#222">DISA feedback</text>

    <!-- Pin 12 -->
    <circle cx="320" cy="448" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="451" text-anchor="middle">12</text>
    <text x="310" y="451" text-anchor="end" fill="#222">Reserved / nc</text>

    <!-- Pin 25 -->
    <circle cx="480" cy="448" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="451" text-anchor="middle">25</text>
    <text x="490" y="451" fill="#222">Reserved / nc</text>

    <!-- Pin 13 -->
    <circle cx="320" cy="476" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="320" y="479" text-anchor="middle">13</text>
    <text x="310" y="479" text-anchor="end" fill="#222">Reserved / nc</text>

    <!-- Pin 26 -->
    <circle cx="480" cy="476" r="8" fill="#fff" stroke="#234" stroke-width="1.5"/>
    <text x="480" y="479" text-anchor="middle">26</text>
    <text x="490" y="479" fill="#222">Reserved / nc</text>
  </g>

  <!-- Side note -->
  <rect x="20" y="100" width="200" height="370" fill="#fff8e0" stroke="#bb7" stroke-width="1" rx="4"/>
  <text x="30" y="120" font-size="12" font-weight="bold" fill="#863">Reading</text>
  <text x="30" y="142" font-size="10" fill="#333">
    Pins 1–13: left column
    (wiring-side view).
  </text>
  <text x="30" y="172" font-size="10" fill="#333">
    Pins 14–26: right column.
  </text>
  <text x="30" y="200" font-size="10" fill="#333">
    Power pins: 1, 3, 4.
  </text>
  <text x="30" y="216" font-size="10" fill="#333">
    Ground: 2 + 11.
  </text>
  <text x="30" y="240" font-size="10" fill="#333">
    K-CAN: 14 (H), 15 (L).
  </text>
  <text x="30" y="256" font-size="10" fill="#333">
    PT-CAN: 16 (H), 17 (L).
  </text>
  <text x="30" y="280" font-size="10" fill="#333">
    EWS (immobilizer):
  </text>
  <text x="30" y="292" font-size="10" fill="#333">
    pins 5/18 ring antenna.
  </text>
  <text x="30" y="316" font-size="10" font-style="italic" fill="#a00">
    *Pin 20 is coding-only;
  </text>
  <text x="30" y="328" font-size="10" font-style="italic" fill="#a00">
    do not jumper.
  </text>
  <text x="30" y="358" font-size="9" fill="#666">
    Verify with multimeter
  </text>
  <text x="30" y="370" font-size="9" fill="#666">
    against known-good
  </text>
  <text x="30" y="382" font-size="9" fill="#666">
    harness before splice.
  </text>

  <!-- Legend -->
  <rect x="600" y="100" width="180" height="370" fill="#f4f4f4" stroke="#888" stroke-width="1" rx="4"/>
  <text x="610" y="120" font-size="11" font-weight="bold" fill="#222">Wire color key</text>
  <text x="610" y="142" font-size="10" fill="#a33">+12V supply (red/BR)</text>
  <text x="610" y="158" font-size="10" fill="#a33">KL15/50: switched</text>
  <text x="610" y="178" font-size="10" fill="#333">GND: brown</text>
  <text x="610" y="194" font-size="10" fill="#06a">K-CAN H/L: twisted</text>
  <text x="610" y="210" font-size="10" fill="#174">PT-CAN H/L: twisted</text>
  <text x="610" y="234" font-size="9" font-style="italic" fill="#666">
    Color codes are typical;
  </text>
  <text x="610" y="246" font-size="9" font-style="italic" fill="#666">
    always trace the wire
  </text>
  <text x="610" y="258" font-size="9" font-style="italic" fill="#666">
    by continuity, not color.
  </text>

  <text x="610" y="295" font-size="11" font-weight="bold" fill="#222">Diagnostic tip</text>
  <text x="610" y="315" font-size="10" fill="#333">A 'no comm' complaint</text>
  <text x="610" y="327" font-size="10" fill="#333">on PT-CAN often points</text>
  <text x="610" y="339" font-size="10" fill="#333">to the splice at pin 16</text>
  <text x="610" y="351" font-size="10" fill="#333">after rodent damage</text>
  <text x="610" y="363" font-size="10" fill="#333">in the engine bay.</text>
</svg>
