# BeeEmUu nginx vhost for beemuu.com + www.beemuu.com
#
# Front-end served from /var/www/beemuu/frontend.
# /api/* proxied to the beemuu-api Python service on 127.0.0.1:8765.
#
# Setup notes:
#   * This file is the base HTTP config. Run `certbot --nginx` after install
#     to obtain a Let's Encrypt cert; certbot will append the HTTPS server block
#     and an HTTP->HTTPS redirect automatically. See DEPLOY.md.
#   * /var/www/beemuu/frontend is owned by the interserver "ubuntu 24 desktop"
#     template (or by whoever provisions the host). Adjust path if needed.

server {
    server_name beemuu.com www.beemuu.com;

    root /var/www/beemuu/frontend;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    access_log /var/log/nginx/beemuu-access.log;
    error_log  /var/log/nginx/beemuu-error.log warn;

    client_max_body_size 25m;

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif|mp4|webm)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host              beemuu.com;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known) { deny all; }
}
