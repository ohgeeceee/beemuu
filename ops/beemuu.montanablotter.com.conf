# beemuu.montanablotter.com — hosted admin panel + public landing proxy.
#
# Public site (landing, stats, hosted panel) → beemuu-api on 127.0.0.1:8765.
# Admin panel (/admin/*) → same upstream, but with stricter security headers
# and a higher body-size limit disabled (the admin API is JSON-only).
#
# Activate with:
#   sudo ln -s /etc/nginx/sites-available/beemuu.montanablotter.com.conf \
#            /etc/nginx/sites-enabled/beemuu.montanablotter.com.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name beemuu.montanablotter.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name beemuu.montanablotter.com;

    ssl_certificate     /etc/letsencrypt/live/montanablotter.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/montanablotter.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Stricter security headers for the admin surface.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Admin routes get the strictest CSP — no inline scripts in the admin UI,
    # so we can drop 'unsafe-inline' for /admin/static/ in a follow-up.
    # For now, allow inline scripts only on the auth pages where the error
    # banner is server-rendered (no inline script, but harmless).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

    # Everything proxies to the beemuu-api Python process. Body size matches
    # what the admin UI is expected to send (small JSON, no uploads yet).
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Don't buffer admin responses — they're small JSON anyway.
        proxy_buffering off;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
