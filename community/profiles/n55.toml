# N55 — 3.0 single twin-scroll turbo DI inline-6 (MSD81 early, MEVD17.2
# later), E9x/F1x/F2x/F3x 35i models and E70/E71, 2009–2017. OBD-II entries
# are emissions-mandated and verified by design.
#
# NOTE: E-series N55 (E9x, E70/E71) uses KWP2000. F-series N55 (F1x/F2x/F3x)
# uses UDS over ENET/DoIP. The UDS DID parameters below only work on F-series.
# The `local:10` placeholder is unverified for E-series and has no open-source
# evidence; confirm with the Parameter Explorer before trusting it.

[[profile]]
id = "n55"
label = "N55 3.0 turbo I6 (MSD81/MEVD17.2) [community, oil temp unverified]"

  [[profile.param]]
  id = "rpm"
  label = "Engine speed"
  unit = "rpm"
  target = 0x12
  query = "obd:0C"
  decode = "u16_quarter"
  min = 0.0
  max = 7000.0

  [[profile.param]]
  id = "coolant"
  label = "Coolant temp"
  unit = "°C"
  target = 0x12
  query = "obd:05"
  decode = "temp_u8"
  min = -40.0
  max = 150.0

  [[profile.param]]
  id = "oil"
  label = "Oil temp [UNVERIFIED placeholder]"
  unit = "°C"
  target = 0x12
  query = "local:10"
  decode = "temp_u8"
  min = -40.0
  max = 160.0

  [[profile.param]]
  id = "iat"
  label = "Intake air temp (post-IC)"
  unit = "°C"
  target = 0x12
  query = "obd:0F"
  decode = "temp_u8"
  min = -40.0
  max = 100.0

  [[profile.param]]
  id = "map"
  label = "Manifold pressure (abs)"
  unit = "kPa"
  target = 0x12
  query = "obd:0B"
  decode = "u8"
  min = 0.0
  max = 255.0

  [[profile.param]]
  id = "baro"
  label = "Barometric pressure"
  unit = "kPa"
  target = 0x12
  query = "obd:33"
  decode = "u8"
  min = 60.0
  max = 110.0

  [[profile.param]]
  id = "load"
  label = "Engine load"
  unit = "%"
  target = 0x12
  query = "obd:04"
  decode = "percent_a"
  min = 0.0
  max = 100.0

  [[profile.param]]
  id = "throttle"
  label = "Throttle position"
  unit = "%"
  target = 0x12
  query = "obd:11"
  decode = "percent_a"
  min = 0.0
  max = 100.0

  [[profile.param]]
  id = "speed"
  label = "Vehicle speed"
  unit = "km/h"
  target = 0x12
  query = "obd:0D"
  decode = "u8"
  min = 0.0
  max = 300.0

  [[profile.param]]
  id = "volt"
  label = "Module voltage"
  unit = "V"
  target = 0x12
  query = "obd:42"
  decode = "u16_milli"
  min = 8.0
  max = 16.0


  # --- UDS DIDs (F-series N55 only — E-series uses KWP2000, not UDS) ---
  # These DIDs are verified from OBDb (CC-BY-SA) and only work on F-series
  # N55 (F1x/F2x/F3x) via ENET/DoIP. E-series N55 ignores them.
  # See https://github.com/obdb/Vehicle-Parameter for original data.
  #
  # NOTE: DID 4506 is OBD-II PID 0x5C (oil temp). Using the DID provides the
  # same value when OBD-II isn't available on F-series (e.g., ENET mode).
  # OBDb PID 0x5C label: "Oil temperature" (raw temp_u8, °C).
  #[[profile.param]]
  #id = "oil_did"
  #label = "Oil temperature (DID 4506) [F-series only]"
  #unit = "°C"
  #target = 0x12
  #query = "did:4506"
  #decode = "temp_u8"
  #min = -40.0
  #max = 160.0
  #
  # OBDb DID 411E: "Coolant temperature" (raw u8, °C, 0xFF = not available).
  # OBD-II PID 0x05 is the same data; DID is useful for ENET-only sessions.
  #[[profile.param]]
  #id = "coolant_did"
  #label = "Coolant temperature (DID 411E) [F-series only]"
  #unit = "°C"
  #target = 0x12
  #query = "did:411E"
  #decode = "temp_u8"
  #min = -40.0
  #max = 150.0
  #
  # OBDb DID 4015: "Intake air temperature" (raw u8, °C, 0xFF = not available).
  # OBD-II PID 0x0F is the same data; DID is useful for ENET-only sessions.
  #[[profile.param]]
  #id = "iat_did"
  #label = "Intake air temperature (DID 4015) [F-series only]"
  #unit = "°C"
  #target = 0x12
  #query = "did:4015"
  #decode = "temp_u8"
  #min = -40.0
  #max = 100.0
  #
  # OBDb DID DA12: "Transmission oil temperature" (EGS/GA8HP).
  # Decode uncertain: might be raw °C (0xFF = not available) or u8.
  # No safe OBD-II equivalent on the N55.
  #[[profile.param]]
  #id = "atf_temp"
  #label = "ATF temperature (EGS DID DA12) [F-series only, decode uncertain]"
  #unit = "°C"
  #target = 0x18
  #query = "did:DA12"
  #decode = "u8"
  #min = 0.0
  #max = 255.0
  #
  # OBDb DID DA1F: "Kickdown switch" (EGS/GA8HP).
  # 0x00 = not pressed, 0x01 = pressed. Only useful for F-series auto.
  #[[profile.param]]
  #id = "kickdown"
  #label = "Kickdown switch (EGS DID DA1F) [F-series only]"
  #unit = ""
  #target = 0x18
  #query = "did:DA1F"
  #decode = "u8"
  #min = 0.0
  #max = 1.0

