# B58 — 3.0 turbo DI inline-6 (Bosch DME 8.x), F/G-series x40i models, Toyota
# GR Supra, 2015+. Connect via ENET/DoIP. OBD-II entries are emissions-
# mandated and verified by design.
#
# No oil-temp placeholder here on purpose: the B58 DME is UDS-based and reads
# via `did:HHHH`, and no community-confirmed DID is recorded yet. Map it with
# the Parameter Explorer (scan DIDs, rev/warm the engine, watch which value
# tracks), then add it as `query = "did:XXXX"` with a [verified on <chassis>]
# note and open a PR.

[[profile]]
id = "b58"
label = "B58 3.0 turbo I6 (DME 8.x, F/G-series) [community]"

  [[profile.param]]
  id = "rpm"
  label = "Engine speed"
  unit = "rpm"
  target = 0x12
  query = "obd:0C"
  decode = "u16_quarter"
  min = 0.0
  max = 7000.0

  [[profile.param]]
  id = "coolant"
  label = "Coolant temp"
  unit = "°C"
  target = 0x12
  query = "obd:05"
  decode = "temp_u8"
  min = -40.0
  max = 150.0

  [[profile.param]]
  id = "iat"
  label = "Intake air temp (post-IC)"
  unit = "°C"
  target = 0x12
  query = "obd:0F"
  decode = "temp_u8"
  min = -40.0
  max = 100.0

  [[profile.param]]
  id = "map"
  label = "Manifold pressure (abs)"
  unit = "kPa"
  target = 0x12
  query = "obd:0B"
  decode = "u8"
  min = 0.0
  max = 255.0

  [[profile.param]]
  id = "baro"
  label = "Barometric pressure"
  unit = "kPa"
  target = 0x12
  query = "obd:33"
  decode = "u8"
  min = 60.0
  max = 110.0

  [[profile.param]]
  id = "load"
  label = "Engine load"
  unit = "%"
  target = 0x12
  query = "obd:04"
  decode = "percent_a"
  min = 0.0
  max = 100.0

  [[profile.param]]
  id = "throttle"
  label = "Throttle position"
  unit = "%"
  target = 0x12
  query = "obd:11"
  decode = "percent_a"
  min = 0.0
  max = 100.0

  [[profile.param]]
  id = "speed"
  label = "Vehicle speed"
  unit = "km/h"
  target = 0x12
  query = "obd:0D"
  decode = "u8"
  min = 0.0
  max = 300.0

  [[profile.param]]
  id = "volt"
  label = "Module voltage"
  unit = "V"
  target = 0x12
  query = "obd:42"
  decode = "u16_milli"
  min = 8.0
  max = 16.0

  [[profile.param]]
  id = "ambient"
  label = "Ambient temp"
  unit = "°C"
  target = 0x12
  query = "obd:46"
  decode = "temp_u8"
  min = -40.0
  max = 60.0
