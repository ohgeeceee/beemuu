# Community fault-code descriptions. Hex codes, case-insensitive.
# Overrides the built-in table in src-tauri/src/data/dtc.rs.
# See README.md in this folder. Do NOT paste text extracted from ISTA
# or other proprietary software.
#
# v0.8.0 PR #1 — rescued rebuild. The previous revision of this file was
# truncated mid-string, so the TOML parse failed and ZERO overlay entries
# loaded (the Diagnostics tab reported the error; nothing else did). The
# corpus below is rebuilt from in-repo sources only:
#
#   - backend/seed_bmw_dim01.py — BMW hex codes curated from
#     research/bmw_diag_dim01_dtcs.md (community/open references:
#     BimmerFest, Bimmerforums, M5Board, SpoolStreet, BabyBMW,
#     BimmerProfs, AutoExplain). Per-code provenance URLs are preserved
#     in that seed file; they are not repeated here to keep this file
#     scannable.
#   - backend/seed_bmw.py — N54/N55/S55/B58-family codes; the title
#     for 29E0 comes from community/opinions/29E0.toml, the project's
#     curated source of truth for that code.
#
# Discipline:
#   - Codes already in the built-in table (src-tauri/src/data/dtc.rs)
#     are deliberately NOT repeated — the overlay would only create
#     drift; edit the built-in table to change those texts.
#   - Generic SAE J2012 codes (P/B/C/U format) are out of scope for the
#     desktop overlay: the desktop app renders BMW-style hex DTCs. The
#     generic corpus lives in the hosted API (backend/seed_dtcs.py).
#   - Cross-source conflicts are resolved in favour of the
#     research-documented dim01 entry, except where a
#     community/opinions/*.toml file exists (that file wins). Conflicts
#     seen during the rebuild: 30DA (dim01 "NOx sensor, heating time"
#     kept over seed_bmw "No bus sleep / wake-up fault"), 29E0
#     (opinions "Mixture too lean" kept over dim01's rail-pressure
#     wording).

